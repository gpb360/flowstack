<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>FlowStack - All-in-One Business Automation Platform</title>
    <meta name="title" content="FlowStack - All-in-One Business Automation Platform" />
    <meta name="description" content="The premium alternative to GoHighLevel. CRM, marketing automation, AI agents, and more in one powerful platform. Scale your business with intelligent workflows and 24/7 AI-powered automation." />
    <meta name="keywords" content="CRM, marketing automation, AI agents, workflow automation, GoHighLevel alternative, business automation, landing page builder, email marketing, SMS marketing, phone system, analytics, lead generation, sales pipeline" />
    <meta name="author" content="FlowStack" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://flowstack.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flowstack.com/" />
    <meta property="og:title" content="FlowStack - All-in-One Business Automation Platform" />
    <meta property="og:description" content="The premium alternative to GoHighLevel. CRM, marketing automation, AI agents, and more in one powerful platform." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="FlowStack" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://flowstack.com/" />
    <meta name="twitter:title" content="FlowStack - All-in-One Business Automation Platform" />
    <meta name="twitter:description" content="The premium alternative to GoHighLevel. CRM, marketing automation, AI agents, and more in one powerful platform." />
    <meta name="twitter:image" content="/twitter-image.png" />
    <meta name="twitter:creator" content="@flowstack" />
    <meta name="twitter:site" content="@flowstack" />

    <!-- Additional SEO -->
    <meta name="application-name" content="FlowStack" />
    <meta name="apple-mobile-web-app-title" content="FlowStack" />
    <meta name="theme-color" content="#d4af37" />
    <meta name="msapplication-TileColor" content="#d4af37" />

    <!-- Structured Data (JSON-LD) - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FlowStack",
      "url": "https://flowstack.com",
      "logo": "https://flowstack.com/logo.png",
      "description": "The all-in-one business automation platform with CRM, marketing automation, AI agents, and more.",
      "sameAs": [
        "https://twitter.com/flowstack",
        "https://linkedin.com/company/flowstack",
        "https://github.com/flowstack",
        "https://youtube.com/@flowstack"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-555-123-4567",
        "contactType": "Customer Service",
        "email": "hello@flowstack.com"
      }
    }
    </script>

    <!-- Structured Data (JSON-LD) - Product -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "FlowStack",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "97",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Professional",
          "price": "297",
          "priceCurrency": "USD"
        }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "2500"
      },
      "description": "The all-in-one business automation platform with CRM, marketing automation, AI agents, and more."
    }
    </script>

    <!-- Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://api.supabase.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
